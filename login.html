<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        @keyframes pulse-orb {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.20; }
            45% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.12; }
            70% { transform: translate(-50%, -50%) scale(1.25); opacity: 0.25; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
        }
        @keyframes drift-orb {
            0% { transform: translate(0, 0) rotate(0deg); }
            30% { transform: translate(40px, -20px) rotate(5deg); }
            60% { transform: translate(70px, 40px) rotate(15deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        @keyframes orbit-orb {
            0% { transform: rotate(0deg) translateX(300px) rotate(0deg) scale(1); }
            33% { transform: rotate(120deg) translateX(320px) rotate(-120deg) scale(1.1); }
            66% { transform: rotate(240deg) translateX(280px) rotate(-240deg) scale(0.9); }
            100% { transform: rotate(360deg) translateX(300px) rotate(-360deg) scale(1); }
        }
        @keyframes card-entrance {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-15deg); }
            100% { transform: translateX(200%) skewX(-15deg); }
        }
        .animate-pulse-orb {
            animation: pulse-orb 18s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .animate-drift-orb {
            animation: drift-orb 24s ease-in-out infinite;
        }
        .animate-orbit-orb {
            animation: orbit-orb 30s linear infinite;
        }
        .animate-card-entrance {
            animation: card-entrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .glass-shimmer {
            position: relative;
            overflow: hidden;
        }
        .glass-shimmer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-15deg);
            animation: shimmer 6s infinite;
            z-index: 10;
            pointer-events: none;
        }
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        
        .parallax-orb {
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        #neural-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            pointer-events: none;
        }

        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            .animate-pulse-orb, .animate-drift-orb, .animate-orbit-orb, .animate-card-entrance, .glass-shimmer::before {
                animation: none !important;
            }
            .parallax-orb {
                transition: none !important;
                transform: none !important;
            }
            #neural-canvas {
                display: none;
            }
            body {
                background: radial-gradient(circle at 50% 50%, #1a1025 0%, #06060E 100%) !important;
            }
        }
        
        /* Custom Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 999px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 9999;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>

<div id="toast" class="toast"></div>

<script>
    // Always clear old sessions when visiting the login page via the PDF link
    localStorage.removeItem('fluxo_jwt');

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function handleAuth(action) {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn = document.getElementById(action + '-btn');
        
        if(!email || !password) return showToast('Please enter credentials.');
        
        const originalText = btn.innerText;
        btn.innerText = 'Processing...';
        
        try {
            const res = await fetch('/api/' + action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error);
            
            if (action === 'register') {
                showToast('Account Created! Please click Log In.');
                return; // Stop here, forcing them to manually log in
            }

            localStorage.setItem('fluxo_jwt', data.token);
            showToast('Success! Redirecting...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        } catch (err) {
            showToast(err.message || 'Authentication Failed');
        } finally {
            btn.innerText = originalText;
        }
    }

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (!prefersReducedMotion) {
        // Parallax Effect for Orbs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth - 0.5;
            const y = e.clientY / window.innerHeight - 0.5;
            
            document.querySelectorAll('.parallax-orb').forEach(orb => {
                const speed = parseFloat(orb.getAttribute('data-parallax'));
                const xOffset = x * speed * 1000;
                const yOffset = y * speed * 1000;
                
                orb.style.transform = `translate(calc(-50% + ${xOffset}px), calc(-50% + ${yOffset}px))`;
            });
        });

        // Atmospheric Nordic Canvas Animation
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Frost Particles
        class FrostParticle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.vx = (Math.random() - 0.5) * 0.2;
                this.vy = (Math.random() - 0.5) * 0.2 - 0.1;
                this.angle = Math.random() * Math.PI * 2;
                this.vAngle = (Math.random() - 0.5) * 0.01;
                this.baseOpacity = Math.random() * 0.4 + 0.1;
                this.glistenPhase = Math.random() * Math.PI * 2;
                this.glistenSpeed = Math.random() * 0.01 + 0.005;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.vAngle;
                this.glistenPhase += this.glistenSpeed;

                if (this.x < -10) this.x = width + 10;
                if (this.x > width + 10) this.x = -10;
                if (this.y < -10) this.y = height + 10;
                if (this.y > height + 10) this.y = -10;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                let glisten = Math.sin(this.glistenPhase) * 0.4;
                let currentOpacity = Math.max(0, Math.min(1, this.baseOpacity + glisten));

                ctx.fillStyle = `rgba(226, 232, 240, ${currentOpacity})`;
                
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size, 0);
                ctx.lineTo(0, this.size);
                ctx.lineTo(-this.size, 0);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        const particles = [];
        const numParticles = Math.floor(window.innerWidth / 15);
        for (let i = 0; i < numParticles; i++) {
            particles.push(new FrostParticle());
        }

        let time = 0;
        function drawAurora() {
            time += 0.002;
            
            ctx.save();
            const segments = 4;
            const segmentWidth = width / segments;

            for (let layer = 0; layer < 3; layer++) {
                const layerOffset = layer * 100;
                const timeOffset = layer * 2;
                
                ctx.beginPath();
                ctx.moveTo(0, height);
                
                for (let i = 0; i <= segments; i++) {
                    const x = i * segmentWidth;
                    const yOffset = Math.sin(time + i + timeOffset) * 150 + Math.cos(time * 0.5 + i) * 50;
                    const y = height * 0.6 + layerOffset + yOffset;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();

                const grad = ctx.createLinearGradient(0, height * 0.3, 0, height);
                if (layer === 0) {
                    grad.addColorStop(0, 'rgba(6, 182, 212, 0.08)');
                    grad.addColorStop(1, 'rgba(6, 182, 212, 0)');
                } else if (layer === 1) {
                    grad.addColorStop(0, 'rgba(168, 85, 247, 0.05)');
                    grad.addColorStop(1, 'rgba(168, 85, 247, 0)');
                } else {
                    grad.addColorStop(0, 'rgba(226, 232, 240, 0.06)');
                    grad.addColorStop(1, 'rgba(226, 232, 240, 0)');
                }

                ctx.fillStyle = grad;
                ctx.fill();
            }
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            drawAurora();

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    }
</script>
